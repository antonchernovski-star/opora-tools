<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Логотип «Опора»: колонна-опора в круге фирменного голубого градиента -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2FC6F6"/>
      <stop offset="1" stop-color="#0E9FD8"/>
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="44" fill="url(#g)"/>

  <!-- Стилизованная опора (колонна) -->
  <g fill="#FFFFFF">
    <rect x="30" y="26" width="36" height="7" rx="3.5"/>
    <rect x="34" y="37" width="6" height="26" rx="3"/>
    <rect x="45" y="37" width="6" height="26" rx="3"/>
    <rect x="56" y="37" width="6" height="26" rx="3"/>
    <rect x="28" y="66" width="40" height="7" rx="3.5"/>
  </g>
</svg>
